version: '3.8'

services:
  # ═══════════════════════════════════════════
  # BASE DE DATOS POSTGRESQL
  # ═══════════════════════════════════════════
  db:
    image: postgres:15-alpine
    container_name: safepulse-db
    restart: always
    environment:
      POSTGRES_USER: safepulse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SafePulse2024!}
      POSTGRES_DB: safepulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # BACKEND FASTAPI
  # ═══════════════════════════════════════════
  backend:
    build: ./backend
    container_name: safepulse-api
    restart: always
    environment:
      DATABASE_URL: postgresql://safepulse:${DB_PASSWORD:-SafePulse2024!}@db:5432/safepulse
      SECRET_KEY: ${SECRET_KEY:-cambia-esta-clave-en-produccion-muy-larga-12345}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  # ═══════════════════════════════════════════
  # NGINX (SERVIDOR WEB + PROXY)
  # ═══════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: safepulse-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend

  # ═══════════════════════════════════════════
  # CERTBOT (SSL AUTOMÁTICO) - Opcional
  # ═══════════════════════════════════════════
  certbot:
    image: certbot/certbot
    container_name: safepulse-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
