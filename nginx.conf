events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting (protección básica)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;  # Cambiar por tu dominio: server_name safepulse.tudominio.com;

        # Para SSL con Let's Encrypt (descomentar cuando tengas dominio)
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        root /usr/share/nginx/html;
        index index.html;

        # ═══════════════════════════════════════════
        # FRONTEND (React estático)
        # ═══════════════════════════════════════════
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ═══════════════════════════════════════════
        # API BACKEND (Proxy a FastAPI)
        # ═══════════════════════════════════════════
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Documentación de la API
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://backend:8000/health;
        }

        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ═══════════════════════════════════════════
    # HTTPS (Descomentar cuando tengas SSL)
    # ═══════════════════════════════════════════
    # server {
    #     listen 443 ssl;
    #     server_name safepulse.tudominio.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/safepulse.tudominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/safepulse.tudominio.com/privkey.pem;
    #
    #     # ... mismo contenido que el servidor HTTP ...
    # }
}
